<div [ngClass]="backgroundColor" class="p-4 rounded-md mt-2 border border-gray-200 dark:border-gray-600 dark:bg-gray-800">
  <div
    class="flex justify-between items-center cursor-pointer"
    role="button"
    tabindex="0"
    (click)="toggleFilters()"
    (keydown.enter)="toggleFilters()"
    (keydown.space)="$event.preventDefault(); toggleFilters()">
    <h1 class="font-bold text-xl hover:text-gray-800 dark:text-white dark:hover:text-gray-300">{{ language === 'es' ? 'Estadísticas Pokémon' : 'Pokémon Statistics' }}</h1>

    <app-ui-button variant="icon" type="button" (buttonClick)="toggleFilters(); $event.stopPropagation()">
      <mat-icon>{{ filtersVisible ? 'expand_less' : 'expand_more' }}</mat-icon>
    </app-ui-button>
  </div>
  <div [@toggleFilters]="filtersVisible ? 'visible' : 'hidden'" class="flex flex-col items-center bg-white p-2 rounded-md w-full">
    <div *ngFor="let stat of statViews; trackBy: trackByStat" class="w-full flex items-center mb-2">
      <span class="w-1/4">{{ stat.name }}:</span>
      <div class="flex items-center w-full">
        <span class="w-12 text-right">{{ stat.baseStat }}</span>
        <div class="w-full dark:bg-gray-200 bg-gray-100 rounded-full overflow-hidden ml-2">
          <div [ngStyle]="{'width': stat.width, 'background-color': stat.color}" class="h-4"></div>
        </div>
      </div>
    </div>
    <div class="w-full flex items-center mb-2">
      <span class="w-1/4">{{ language === 'es' ? 'Estadísticas Totales' : 'Total Stats' }}: </span>
      <div class="flex items-center w-full">
        <h1 class="w-12 text-right font-bold">{{totalStats}}</h1>
        <div class="w-full bg-gray-100 rounded-full overflow-hidden ml-2">
          <div></div>
        </div>
      </div>
    </div>
  </div>
</div>
