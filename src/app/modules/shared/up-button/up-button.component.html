<!-- Botón para scroll hacia arriba -->
<div id="upButton">
  <app-ui-button
    variant="ghost"
    type="button"
    ariaLabel="Scroll to top"
    extraClasses="!w-full !h-full !min-w-0 !min-h-0 !p-0 !rounded-full !bg-transparent !border-0 !shadow-none hover:!bg-transparent"
    (buttonClick)="scrollUp()">
    <mat-icon class="text-black flecha">north</mat-icon>
  </app-ui-button>
</div>

<!-- Botón para scroll hacia abajo -->
<div id="downButton">
  <app-ui-button
    variant="ghost"
    type="button"
    ariaLabel="Scroll to bottom"
    extraClasses="!w-full !h-full !min-w-0 !min-h-0 !p-0 !rounded-full !bg-transparent !border-0 !shadow-none hover:!bg-transparent"
    (buttonClick)="scrollToBottom()">
    <mat-icon class="text-black flecha">south</mat-icon>
  </app-ui-button>
</div>
