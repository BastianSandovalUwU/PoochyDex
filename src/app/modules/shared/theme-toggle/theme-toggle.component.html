<app-ui-button
  variant="ghost"
  type="button"
  [ariaLabel]="(isDarkMode$ | async) ? 'Switch to light mode' : 'Switch to dark mode'"
  extraClasses="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200"
  [attr.title]="(isDarkMode$ | async) ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
  (buttonClick)="toggleTheme()">
  <mat-icon class="text-gray-600 dark:text-gray-300 transition-transform duration-200">
    {{ (isDarkMode$ | async) ? 'light_mode' : 'dark_mode' }}
  </mat-icon>
</app-ui-button>
