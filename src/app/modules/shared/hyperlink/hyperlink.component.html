<button
  type="button"
  (click)="redirecTo()"
  [ngClass]="{'text-blue-500': textBlue, 'hover:text-blue-600': textBlue}"
  class="cursor-pointer inline border-0 bg-transparent p-0 font-inherit text-left">
  {{ (type === 'game' ? getGameName(value) : '') |replaceDash |titlecase}}
  {{ (type === 'pokemon' ? value : '') |replaceDash |titlecase}}
  {{ (type === 'localization' ? value : '') |replaceDash |titlecase |translateLocalizationName}}
</button>
