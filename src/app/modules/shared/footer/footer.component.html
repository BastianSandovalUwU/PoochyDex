<div class="footer-container shadow-lg border-t border-gray-300/80 dark:border-gray-600/80">
  <span class="footer-header sm:ml-4 cursor-pointer text-gray-800 dark:text-gray-200 hover:text-blue-500 dark:hover:text-blue-400">
    Poochy&copy; {{currentYear}}
  </span>
  <div class="language-flags">
    <button
      type="button"
      class="language-flag p-0 border-0 bg-transparent cursor-pointer dark:opacity-80 hover:opacity-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded"
      (click)="setLanguage('en')"
      [attr.title]="currentLanguage === 'es' ? 'Cambiar a Inglés' : 'Switch to English'"
      [attr.aria-label]="currentLanguage === 'es' ? 'Cambiar a Inglés' : 'Switch to English'">
      <img src="./assets/icons/flags/usa_flag.png" alt="" class="block pointer-events-none">
    </button>
    <button
      type="button"
      class="language-flag p-0 border-0 bg-transparent cursor-pointer dark:opacity-80 hover:opacity-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded"
      (click)="setLanguage('es')"
      [attr.title]="currentLanguage === 'es' ? 'Cambiar a Español' : 'Switch to Spanish'"
      [attr.aria-label]="currentLanguage === 'es' ? 'Cambiar a Español' : 'Switch to Spanish'">
      <img src="./assets/icons/flags/spain_flag.png" alt="" class="block pointer-events-none">
    </button>
  </div>
</div>
