<div class="footer-container shadow-lg border-t border-gray-300/80 dark:border-gray-600/80">
  <span class="footer-header sm:ml-4 cursor-pointer text-gray-800 dark:text-gray-200 hover:text-blue-500 dark:hover:text-blue-400">
    Poochy&copy; {{currentYear}}
  </span>
  <div class="language-flags" role="group" [attr.aria-label]="currentLanguage === 'es' ? 'Idioma' : 'Language'">
    <app-ui-button
      variant="ghost"
      type="button"
      [extraClasses]="languageToggleExtraClasses('en')"
      [ariaLabel]="currentLanguage === 'es' ? 'Cambiar a Inglés' : 'Switch to English'"
      [attr.title]="currentLanguage === 'es' ? 'Cambiar a Inglés' : 'Switch to English'"
      (buttonClick)="setLanguage('en')">
      <span class="language-emoji select-none leading-none" aria-hidden="true">🇺🇸</span>
    </app-ui-button>
    <app-ui-button
      variant="ghost"
      type="button"
      [extraClasses]="languageToggleExtraClasses('es')"
      [ariaLabel]="currentLanguage === 'es' ? 'Cambiar a Español' : 'Switch to Spanish'"
      [attr.title]="currentLanguage === 'es' ? 'Cambiar a Español' : 'Switch to Spanish'"
      (buttonClick)="setLanguage('es')">
      <span class="language-emoji select-none leading-none" aria-hidden="true">🇪🇸</span>
    </app-ui-button>
  </div>
</div>
