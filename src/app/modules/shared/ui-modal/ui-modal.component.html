<div
  *ngIf="open"
  class="ui-modal__backdrop fixed inset-0 z-[1100] flex items-center justify-center p-4 sm:p-6 bg-black/50 backdrop-blur-[2px]"
  role="dialog"
  aria-modal="true"
  tabindex="-1"
  [attr.aria-labelledby]="title ? titleId : null"
  (click)="onBackdropClick($event)"
  (keydown.escape)="close()">
  <div
    class="ui-modal__panel relative w-full max-w-lg max-h-[min(90vh,40rem)] flex flex-col rounded-2xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-900 shadow-xl overflow-hidden"
    tabindex="-1"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()">
    <header
      class="ui-modal__header flex shrink-0 items-center gap-3 px-4 py-3 border-b border-gray-200 dark:border-gray-700 bg-gray-50/80 dark:bg-gray-800/80">
      <h2
        *ngIf="title"
        [id]="titleId"
        class="flex-1 min-w-0 text-lg font-semibold text-gray-900 dark:text-gray-100 truncate pr-2">
        {{ title }}
      </h2>
      <span *ngIf="!title" class="sr-only" [id]="titleId">{{ closeAriaLabel }}</span>
      <app-ui-button
        variant="ghost"
        type="button"
        [ariaLabel]="closeAriaLabel"
        [extraClasses]="'shrink-0 rounded-lg p-2 text-gray-600 hover:bg-gray-200 dark:text-gray-300 dark:hover:bg-gray-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-purple-500' + (!title ? ' ml-auto' : '')"
        (buttonClick)="close()">
        <mat-icon class="!w-6 !h-6 !text-[24px]">close</mat-icon>
      </app-ui-button>
    </header>
    <div class="ui-modal__body overflow-y-auto flex-1 min-h-0 px-4 py-4 text-gray-800 dark:text-gray-200">
      <ng-content></ng-content>
    </div>
  </div>
</div>
